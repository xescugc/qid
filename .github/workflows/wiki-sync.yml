name: Sync docs to wiki
on:
  push:
    branches: [master]
    paths: ['docs/**']
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync to wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: docs/
          token: ${{ secrets.GITHUB_TOKEN }}
