services:
  pikoci:
    build: ../
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./hello-world/pipeline.hcl:/pipeline.hcl
    command: >
      server
      --db-system mem
      --pubsub-system mem
      --jwt-secret example-secret
      --run-worker
      --pipeline-name hello-world
      --pipeline-config /pipeline.hcl
