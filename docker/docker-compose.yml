services:
  qid:
    #depends_on:
      #- mariadb
    networks:
      - qid
    volumes:
      - cache:/go

  worker:
    volumes:
      - cache:/go
    networks:
      - qid

  mariadb:
    image: mariadb:11.4.2
    networks:
      - qid

  nats:
    image: nats:2.12.0
    networks:
      - qid

  postgresql:
    image: postgres:17
    networks:
      - qid

  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - qid

  kafka:
    image: bitnami/kafka
    networks:
      - qid

  cockroachdb:
    image: cockroachdb/cockroach
    networks:
      - qid

  tidb:
    image: pingcap/tidb
    networks:
      - qid

volumes:
  cache:

networks:
  qid:
